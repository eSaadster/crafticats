<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTM Lifecycle — DataGrid BITS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ead6;
    --accent: #D04040;
    --gold: #D4AF37;
    --dim: rgba(240, 234, 214, 0.55);
    --border: rgba(240, 234, 214, 0.12);
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .container {
    display: flex;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  /* ── FLOW DIAGRAM ── */
  .flow-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 5vh 4vw;
    overflow-y: auto;
  }

  .masthead {
    margin-bottom: 4vh;
  }

  .masthead h1 {
    font-family: 'Space Mono', monospace;
    font-size: max(28px, 3.5vw);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .masthead h1 .accent { color: var(--accent); }

  .masthead .subtitle {
    font-size: max(14px, 1.1vw);
    color: var(--dim);
    margin-top: 1vh;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ── PIPELINE ── */
  .pipeline {
    display: flex;
    gap: 0;
    align-items: stretch;
    width: 100%;
    margin-bottom: 3vh;
  }

  .stage {
    flex: 1;
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .stage-inner {
    border: 1px solid var(--border);
    border-right: none;
    padding: 2.5vh 1.2vw 2vh;
    height: 100%;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
    position: relative;
    background: transparent;
  }

  .stage:last-child .stage-inner { border-right: 1px solid var(--border); }

  .stage.active .stage-inner {
    background: rgba(208, 64, 64, 0.08);
    border-color: var(--accent);
  }

  .stage:last-child.active .stage-inner { border-right-color: var(--accent); }

  .stage-number {
    font-family: 'Space Mono', monospace;
    font-size: max(10px, 0.7vw);
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 0.8vh;
    opacity: 0.7;
  }

  .stage-label {
    font-family: 'Space Mono', monospace;
    font-size: max(11px, 0.85vw);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1vh;
    color: var(--fg);
  }

  .stage-title {
    font-size: max(13px, 1vw);
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.6vh;
  }

  .stage-sub {
    font-size: max(11px, 0.75vw);
    color: var(--dim);
    line-height: 1.4;
  }

  .stage-cmd {
    font-family: 'Space Mono', monospace;
    font-size: max(10px, 0.65vw);
    color: var(--accent);
    margin-top: auto;
    padding-top: 1.5vh;
    opacity: 0.6;
  }

  /* Arrow between stages */
  .stage:not(:last-child)::after {
    content: '▶';
    position: absolute;
    right: -0.6vw;
    top: 50%;
    transform: translateY(-50%);
    font-size: max(10px, 0.8vw);
    color: var(--accent);
    z-index: 2;
    opacity: 0.5;
  }

  /* ── BITS BAR ── */
  .bits-bar {
    display: flex;
    align-items: center;
    gap: 1.5vw;
    padding: 1.8vh 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 3vh;
  }

  .bits-label {
    font-family: 'Space Mono', monospace;
    font-size: max(10px, 0.7vw);
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .bits-items {
    display: flex;
    gap: 1.5vw;
    flex: 1;
  }

  .bits-item {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    font-size: max(11px, 0.8vw);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0.5vh 1vw;
    border-radius: 2px;
  }

  .bits-item:hover, .bits-item.active {
    background: rgba(208, 64, 64, 0.1);
    color: var(--accent);
  }

  .bits-dot {
    width: max(6px, 0.4vw);
    height: max(6px, 0.4vw);
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
  }

  .bits-item.active .bits-dot,
  .bits-item:hover .bits-dot { opacity: 1; }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    padding: 3vh 2vw;
    border-top: 1px solid var(--border);
    min-height: 22vh;
    transition: all 0.3s ease;
  }

  .detail-header {
    display: flex;
    align-items: baseline;
    gap: 1.5vw;
    margin-bottom: 2vh;
  }

  .detail-stage-name {
    font-family: 'Space Mono', monospace;
    font-size: max(18px, 1.8vw);
    font-weight: 700;
    color: var(--accent);
  }

  .detail-phase {
    font-size: max(12px, 0.9vw);
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2vw;
  }

  .detail-col h4 {
    font-family: 'Space Mono', monospace;
    font-size: max(10px, 0.65vw);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1vh;
    opacity: 0.7;
  }

  .detail-col ul {
    list-style: none;
    padding: 0;
  }

  .detail-col li {
    font-size: max(12px, 0.85vw);
    color: rgba(240, 234, 214, 0.85);
    line-height: 1.7;
    padding-left: 1.2em;
    position: relative;
  }

  .detail-col li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    opacity: 0.5;
    font-size: 0.85em;
  }

  /* ── FOOTER ── */
  .footer {
    position: fixed;
    bottom: 2vh;
    left: 4vw;
    display: flex;
    align-items: center;
    gap: 2vw;
    font-size: max(10px, 0.65vw);
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .footer .brand {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: 0.15em;
  }

  .footer .sep { opacity: 0.3; }

  /* ── NAV HINT ── */
  .nav-hint {
    position: fixed;
    bottom: 2vh;
    right: 4vw;
    font-family: 'Space Mono', monospace;
    font-size: max(9px, 0.6vw);
    color: var(--dim);
    opacity: 0.4;
    letter-spacing: 0.1em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .pipeline {
      flex-direction: column;
      gap: 0;
    }

    .stage:not(:last-child)::after {
      content: '▼';
      right: 50%;
      top: auto;
      bottom: -1.2vh;
      transform: translateX(50%);
    }

    .stage-inner {
      border-right: 1px solid var(--border);
      border-bottom: none;
    }

    .stage:last-child .stage-inner {
      border-bottom: 1px solid var(--border);
    }

    .detail-grid {
      grid-template-columns: 1fr;
      gap: 2vh;
    }

    .bits-items {
      flex-wrap: wrap;
      gap: 0.8vw;
    }

    .masthead h1 { font-size: max(22px, 6vw); }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-panel { animation: fadeIn 0.3s ease; }

  .stage-inner {
    animation: fadeIn 0.4s ease backwards;
  }

  .stage:nth-child(1) .stage-inner { animation-delay: 0.05s; }
  .stage:nth-child(2) .stage-inner { animation-delay: 0.1s; }
  .stage:nth-child(3) .stage-inner { animation-delay: 0.15s; }
  .stage:nth-child(4) .stage-inner { animation-delay: 0.2s; }
  .stage:nth-child(5) .stage-inner { animation-delay: 0.25s; }
  .stage:nth-child(6) .stage-inner { animation-delay: 0.3s; }
</style>
</head>
<body>

<div class="container">
  <div class="flow-section">

    <div class="masthead">
      <h1>The <span class="accent">GTM</span> Lifecycle</h1>
      <div class="subtitle">End-to-End · 360° Revenue Operations · BITS Framework</div>
    </div>

    <div class="pipeline" id="pipeline">
      <!-- Stages injected by JS -->
    </div>

    <div class="bits-bar">
      <span class="bits-label">Powered by</span>
      <div class="bits-items">
        <div class="bits-item" data-filter="bi"><span class="bits-dot"></span> BI — Business Intelligence</div>
        <div class="bits-item" data-filter="tooling"><span class="bits-dot"></span> Tooling — Stack & Ops</div>
        <div class="bits-item" data-filter="strategy"><span class="bits-dot"></span> Strategy — GTM & RevOps</div>
      </div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <!-- Detail injected by JS -->
    </div>

  </div>
</div>

<div class="footer">
  <span class="brand">DATA—GRID</span>
  <span class="sep">|</span>
  <span>AI-Native Revenue Operations</span>
  <span class="sep">|</span>
  <span>data-grid.ai</span>
</div>

<div class="nav-hint">click any stage · filter by BITS layer</div>

<script>
const stages = [
  {
    id: 'discover',
    number: '01',
    label: 'DISCOVER',
    title: 'Market Signal',
    sub: 'ICP · TAM · Intel',
    cmd: '/discover',
    bits: ['bi'],
    detail: {
      bi: ['ICP research & definition', 'TAM / SAM / SOM sizing', 'Lead enrichment pipelines', 'Competitor intelligence', 'Buyer intent signal mapping', 'Firmographic + technographic data'],
      tooling: ['Enrichment APIs (Clearbit, Apollo, Clay)', 'Intent data platforms (Bombora, G2)', 'Competitive intel tools (Klue, Crayon)', 'Data warehouse setup'],
      strategy: ['Market segmentation framework', 'Ideal customer profiling', 'Competitive positioning audit', 'Whitespace opportunity mapping']
    }
  },
  {
    id: 'strategize',
    number: '02',
    label: 'STRATEGIZE',
    title: 'GTM Playbook',
    sub: 'Position · Price · Channel',
    cmd: '/strategize',
    bits: ['strategy'],
    detail: {
      bi: ['Win/loss pattern analysis', 'Pricing sensitivity data', 'Channel performance benchmarks', 'Market trend modeling'],
      tooling: ['Strategy docs & frameworks (Notion, Coda)', 'Pricing tools (ProfitWell, Pricefx)', 'Collaboration platforms'],
      strategy: ['Positioning & messaging architecture', 'Pricing strategy & packaging', 'Channel mix design (PLG, sales-led, hybrid)', 'GTM motion selection', 'Revenue model definition', 'Go-to-market calendar']
    }
  },
  {
    id: 'build',
    number: '03',
    label: 'BUILD',
    title: 'Stack & Ops',
    sub: 'CRM · SEQ · Automation',
    cmd: '/build',
    bits: ['tooling'],
    detail: {
      bi: ['Data architecture & schema design', 'Integration mapping', 'Lead scoring model development', 'Attribution setup'],
      tooling: ['CRM deployment (HubSpot, Salesforce, custom)', 'Sequencing tools (Outreach, Salesloft, Instantly)', 'Enrichment pipeline automation', 'Marketing automation (n8n, Clay, custom)', 'Data sync & ETL', 'Agent-operable backend (InsForge, GraphJin)'],
      strategy: ['Tech stack audit & rationalization', 'Build vs. buy decision framework', 'Ops playbook & SOP development', 'Team workflow design']
    }
  },
  {
    id: 'activate',
    number: '04',
    label: 'ACTIVATE',
    title: 'Launch Campaign',
    sub: 'Outbound · Ads · ABM',
    cmd: '/activate',
    bits: ['tooling', 'strategy'],
    detail: {
      bi: ['Campaign targeting from enriched data', 'Audience segmentation models', 'Predictive lead prioritization', 'A/B test design'],
      tooling: ['Outbound sequences at scale', 'Ad platform setup (Google, LinkedIn, Meta)', 'Content distribution automation', 'ABM orchestration (Demandbase, 6sense)', 'Email drip campaigns', 'Event & webinar tooling'],
      strategy: ['Campaign strategy & creative direction', 'Channel allocation & budget', 'ABM account selection', 'Launch timeline & dependencies', 'Sales enablement materials']
    }
  },
  {
    id: 'optimize',
    number: '05',
    label: 'OPTIMIZE',
    title: 'Measure & Tune',
    sub: 'Attribution · Pipeline · W/L',
    cmd: '/optimize',
    bits: ['bi'],
    detail: {
      bi: ['Multi-touch attribution modeling', 'Pipeline velocity analytics', 'Win/loss analysis', 'Conversion funnel diagnostics', 'Cohort analysis', 'Revenue forecasting'],
      tooling: ['Dashboard & reporting (Looker, Metabase, custom)', 'A/B testing infrastructure', 'Alerting & anomaly detection', 'Data quality monitoring'],
      strategy: ['Performance review cadence', 'Hypothesis-driven optimization', 'Budget reallocation framework', 'Process bottleneck elimination', 'Sales-marketing alignment']
    }
  },
  {
    id: 'scale',
    number: '06',
    label: 'SCALE',
    title: 'Expand & Compound',
    sub: 'Upsell · New Markets · Targets',
    cmd: '/scale',
    bits: ['strategy', 'bi'],
    detail: {
      bi: ['Expansion signal detection', 'Customer health scoring', 'New market TAM analysis', 'Upsell/cross-sell propensity models', 'Revenue attribution across motions'],
      tooling: ['Customer success platforms (Gainsight, Vitally)', 'Expansion playbook automation', 'Multi-market CRM configuration', 'Reporting at scale'],
      strategy: ['New market entry playbooks', 'Upsell & cross-sell strategy', 'Channel partner development', 'Revenue target modeling', 'GTM team scaling plan', 'Compound growth flywheel design']
    }
  }
];

let activeStage = 0;
let activeFilter = null;

function renderPipeline() {
  const el = document.getElementById('pipeline');
  el.innerHTML = stages.map((s, i) => `
    <div class="stage ${i === activeStage ? 'active' : ''}" onclick="selectStage(${i})">
      <div class="stage-inner">
        <div class="stage-number">${s.number}</div>
        <div class="stage-label">${s.label}</div>
        <div class="stage-title">${s.title}</div>
        <div class="stage-sub">${s.sub}</div>
        <div class="stage-cmd">${s.cmd}</div>
      </div>
    </div>
  `).join('');
}

function renderDetail() {
  const s = stages[activeStage];
  const panel = document.getElementById('detailPanel');

  const cols = ['bi', 'tooling', 'strategy'];
  const colLabels = { bi: 'Business Intelligence', tooling: 'Tooling & Stack', strategy: 'Strategy & RevOps' };

  const filteredCols = activeFilter ? cols.filter(c => c === activeFilter) : cols;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-stage-name">${s.label}</div>
      <div class="detail-phase">${s.title} — ${s.sub}</div>
    </div>
    <div class="detail-grid" style="grid-template-columns: repeat(${filteredCols.length}, 1fr);">
      ${filteredCols.map(col => `
        <div class="detail-col">
          <h4>${colLabels[col]}</h4>
          <ul>
            ${s.detail[col].map(item => `<li>${item}</li>`).join('')}
          </ul>
        </div>
      `).join('')}
    </div>
  `;

  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'fadeIn 0.3s ease';
}

function selectStage(i) {
  activeStage = i;
  renderPipeline();
  renderDetail();
}

// BITS filter
document.querySelectorAll('.bits-item').forEach(item => {
  item.addEventListener('click', () => {
    const filter = item.dataset.filter;
    if (activeFilter === filter) {
      activeFilter = null;
      document.querySelectorAll('.bits-item').forEach(b => b.classList.remove('active'));
    } else {
      activeFilter = filter;
      document.querySelectorAll('.bits-item').forEach(b => b.classList.remove('active'));
      item.classList.add('active');
    }
    renderDetail();
  });
});

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    selectStage(Math.min(activeStage + 1, stages.length - 1));
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    selectStage(Math.max(activeStage - 1, 0));
  }
});

// Init
renderPipeline();
renderDetail();
</script>

</body>
</html>
