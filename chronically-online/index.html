<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronically Online / ネット廃人</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>
    <script>
        let tweets = [];
        let particles = [];
        let glitchAmount = 0;
        let scrollSpeed = 2;
        let font;
        
        // Tweet templates mixing English and Japanese
        const tweetTemplates = [
            "just another day scrolling... 終わりなき #ネット廃人",
            "touch grass? 何それ美味しいの？ 🌱",
            "3am thoughts hitting different つぶやき依存症",
            "POV: you're doom scrolling again 無限スクロール地獄",
            "chronically online and proud of it ✨ デジタル中毒",
            "real life.exe has stopped working 現実逃避中...",
            "my screen time? yes. スクリーンタイム：∞",
            "grass is a social construct 外の世界って何？",
            "sleep schedule: 404 not found 不眠症なう",
            "terminally online behavior ネット廃人の日常",
            "touch some pixels instead ピクセルに触れる",
            "reality check failed リアリティチェック失敗",
            "logging off is a myth ログオフは都市伝説",
            "digital native problems デジタルネイティブの悩み",
            "scrolling into the void 虚無へのスクロール"
        ];
        
        class Tweet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.text = random(tweetTemplates);
                this.opacity = 255;
                this.size = random(12, 20);
                this.speed = random(1, 3);
                this.glitchOffset = 0;
            }
            
            update() {
                this.y -= this.speed * scrollSpeed;
                if (this.y < -50) {
                    this.y = height + 50;
                    this.x = random(width);
                    this.text = random(tweetTemplates);
                }
                
                // Random glitch
                if (random() < 0.02) {
                    this.glitchOffset = random(-20, 20);
                } else {
                    this.glitchOffset *= 0.9;
                }
            }
            
            display() {
                push();
                translate(this.x + this.glitchOffset, this.y);
                
                // Tweet container
                fill(0, 0, 0, 150);
                stroke(255, 255, 255, 100);
                strokeWeight(1);
                rect(-5, -20, textWidth(this.text) + 10, 30, 5);
                
                // Tweet text with glitch effect
                noStroke();
                textSize(this.size);
                
                // Glitch layers
                if (abs(this.glitchOffset) > 5) {
                    fill(255, 0, 255, 100);
                    text(this.text, -2, 0);
                    fill(0, 255, 255, 100);
                    text(this.text, 2, 0);
                }
                
                fill(255, 255, 255, this.opacity);
                text(this.text, 0, 0);
                pop();
            }
        }
        
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = random(-1, 1);
                this.vy = random(-2, -0.5);
                this.size = random(1, 3);
                this.life = 255;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 3;
            }
            
            display() {
                noStroke();
                fill(100, 255, 100, this.life);
                rect(this.x, this.y, this.size, this.size);
            }
        }
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            textAlign(CENTER, CENTER);
            
            // Create initial tweets
            for (let i = 0; i < 15; i++) {
                tweets.push(new Tweet(random(width), random(height)));
            }
        }
        
        function draw() {
            // Dark background with subtle noise
            background(10, 10, 15);
            
            // Digital rain effect
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
            
            // Update and display particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].display();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Scanline effect
            stroke(255, 255, 255, 20);
            for (let i = 0; i < height; i += 4) {
                let offset = sin(frameCount * 0.01 + i * 0.01) * 2;
                line(0, i + offset, width, i + offset);
            }
            
            // Update and display tweets
            tweets.forEach(tweet => {
                tweet.update();
                tweet.display();
            });
            
            // Glitch effect overlay
            if (frameCount % 60 === 0) {
                glitchAmount = random(0.1, 0.3);
            }
            glitchAmount *= 0.95;
            
            if (glitchAmount > 0.05) {
                push();
                drawingContext.globalCompositeOperation = 'difference';
                fill(255);
                rect(0, random(height), width, random(5, 50));
                pop();
            }
            
            // Center text overlay
            push();
            textAlign(CENTER, CENTER);
            textSize(48);
            strokeWeight(3);
            
            // Glitchy title
            let titleY = height / 2;
            if (random() < 0.1) {
                stroke(255, 0, 255);
                fill(0, 255, 255);
                text("CHRONICALLY ONLINE", width / 2 + random(-5, 5), titleY);
            }
            
            stroke(0);
            fill(255);
            text("CHRONICALLY ONLINE", width / 2, titleY);
            
            textSize(32);
            text("ネット廃人", width / 2, titleY + 60);
            pop();
            
            // Mouse interaction
            if (mouseIsPressed) {
                scrollSpeed = 5;
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(mouseX, mouseY));
                }
            } else {
                scrollSpeed = lerp(scrollSpeed, 2, 0.1);
            }
        }
        
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
        
        function mousePressed() {
            // Add more tweets on click
            tweets.push(new Tweet(mouseX, mouseY));
        }
    </script>
</body>
</html>
